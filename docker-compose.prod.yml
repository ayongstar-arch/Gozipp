version: '3.8'

services:
  winno-app:
    build: .
    restart: always
    ports:
      - "80:5173"   # Frontend
      - "3000:3000" # API
    env_file: .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: winno_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: CHANGE_ME_PROD
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
